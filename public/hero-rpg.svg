<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 340" role="img" aria-label="見習調律師">
  <defs>
    <linearGradient id="h-aura" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.3" stop-color="#38f2e6" stop-opacity="0"/>
      <stop offset="0.72" stop-color="#38f2e6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#b07bff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="h-hair" x1="80" y1="36" x2="180" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#eafdff"/>
      <stop offset="0.5" stop-color="#7fe9ff"/>
      <stop offset="1" stop-color="#2aa9d6"/>
    </linearGradient>
    <linearGradient id="h-coat" x1="78" y1="160" x2="186" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3fe0cf"/>
      <stop offset="0.55" stop-color="#15889a"/>
      <stop offset="1" stop-color="#0c3b50"/>
    </linearGradient>
    <linearGradient id="h-skin" x1="100" y1="74" x2="158" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff3e9"/>
      <stop offset="1" stop-color="#f3c4a3"/>
    </linearGradient>
    <linearGradient id="h-scarf" x1="96" y1="150" x2="166" y2="176" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffd24a"/>
      <stop offset="1" stop-color="#ff5d7a"/>
    </linearGradient>
    <radialGradient id="h-eye" cx="0.5" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#baf6ff"/>
      <stop offset="0.6" stop-color="#22c3e6"/>
      <stop offset="1" stop-color="#0b3a52"/>
    </radialGradient>
    <radialGradient id="h-gear" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff7e0"/>
      <stop offset="0.5" stop-color="#7fe9ff"/>
      <stop offset="1" stop-color="#38f2e6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 能量光環 -->
  <ellipse cx="130" cy="178" rx="120" ry="158" fill="url(#h-aura)"/>
  <!-- 地面影 -->
  <ellipse cx="130" cy="320" rx="64" ry="12" fill="#04101e" opacity="0.5"/>
  <ellipse cx="130" cy="318" rx="42" ry="6" fill="#38f2e6" opacity="0.28"/>

  <!-- 後髮 -->
  <path fill="url(#h-hair)" stroke="#0b1426" stroke-width="4" stroke-linejoin="round"
    d="M70 110c-6-52 26-86 60-86s66 34 60 86c-4 32 4 40 8 54-28 14-108 14-136 0 4-14 12-22 8-54Z"/>

  <!-- 身體：外套 -->
  <path fill="url(#h-coat)" stroke="#0b1426" stroke-width="4.5" stroke-linejoin="round"
    d="M92 168c12-12 64-12 76 0 12 30 20 70 22 118-40 16-102 16-142 0 2-48 10-88 22-118Z"/>
  <!-- 外套陰影（右半） -->
  <path fill="#0b3b50" opacity="0.42"
    d="M130 162c14 36 20 86 22 124 16-2 30-5 38-9-2-46-10-86-22-116-10-8-26-9-38 1Z"/>
  <!-- 中線扣帶 -->
  <path fill="none" stroke="#eafdff" stroke-width="3" opacity="0.5" d="M130 176v118"/>
  <!-- 鈕扣 -->
  <g fill="#ffd24a"><circle cx="130" cy="200" r="4"/><circle cx="130" cy="226" r="4"/><circle cx="130" cy="252" r="4"/></g>

  <!-- 腿與靴 -->
  <g fill="#16243a" stroke="#0b1426" stroke-width="3">
    <rect x="112" y="282" width="16" height="40" rx="7"/>
    <rect x="132" y="282" width="16" height="40" rx="7"/>
  </g>
  <g fill="#0b1426"><ellipse cx="118" cy="322" rx="14" ry="7"/><ellipse cx="142" cy="322" rx="14" ry="7"/></g>

  <!-- 左臂（垂下） -->
  <path fill="url(#h-coat)" stroke="#0b1426" stroke-width="4" stroke-linejoin="round"
    d="M92 176c-16 8-26 30-26 58 0 10 3 20 8 28 8-4 14-12 16-22l8-56-6-8Z"/>
  <!-- 右臂（舉起，扶齒輪） -->
  <path fill="url(#h-coat)" stroke="#0b1426" stroke-width="4" stroke-linejoin="round"
    d="M168 176c20 0 36 12 44 32 3 8 2 16-2 22-8-2-16-8-20-16l-28-30 6-8Z"/>

  <!-- 圍巾 -->
  <path fill="url(#h-scarf)" stroke="#0b1426" stroke-width="3.5" stroke-linejoin="round"
    d="M98 152c20 12 44 12 64 0 6 6 8 14 6 22-24 10-52 10-76 0-2-8 0-16 6-22Z"/>
  <path fill="#ff5d7a" d="M150 168c8 4 12 14 10 30l-12-4 2-26Z" opacity="0.7"/>

  <!-- 脖子 -->
  <rect x="120" y="140" width="20" height="16" rx="6" fill="url(#h-skin)" stroke="#d79e7c" stroke-width="2"/>

  <!-- 臉 -->
  <path fill="url(#h-skin)" stroke="#d79e7c" stroke-width="2"
    d="M92 100c0-30 16-46 38-46s38 16 38 46c0 26-16 44-38 44s-38-18-38-44Z"/>
  <!-- 耳 -->
  <circle cx="92" cy="104" r="7" fill="url(#h-skin)" stroke="#d79e7c" stroke-width="2"/>
  <circle cx="168" cy="104" r="7" fill="url(#h-skin)" stroke="#d79e7c" stroke-width="2"/>

  <!-- 瀏海（前髮）尖刺 -->
  <path fill="url(#h-hair)" stroke="#0b1426" stroke-width="4" stroke-linejoin="round"
    d="M86 104c-4-40 22-66 44-66s48 26 44 66c-6-18-16-30-30-34-4 10-12 18-22 22-8 4-20 8-36 12Zm44-44c-10 2-18 10-22 24 10-4 18-10 22-18 4 8 12 14 22 18-4-14-12-22-22-24Z"/>
  <!-- 翹起的呆毛 -->
  <path fill="url(#h-hair)" stroke="#0b1426" stroke-width="3" stroke-linejoin="round"
    d="M128 30c10-8 22-6 28 4-12-2-20 2-26 12-2-6-4-12-2-16Z"/>

  <!-- 眉 -->
  <path d="M100 96q12-6 22 0" fill="none" stroke="#5a4636" stroke-width="3" stroke-linecap="round"/>
  <path d="M138 96q12-6 22 0" fill="none" stroke="#5a4636" stroke-width="3" stroke-linecap="round"/>

  <!-- 眼睛（大眼動漫） -->
  <g>
    <!-- 左眼 -->
    <ellipse cx="111" cy="114" rx="12" ry="16" fill="#0b1426"/>
    <ellipse cx="111" cy="117" rx="9.5" ry="12.5" fill="url(#h-eye)"/>
    <circle cx="107" cy="109" r="4.2" fill="#ffffff"/>
    <circle cx="114" cy="121" r="2.2" fill="#d8ffff" opacity="0.85"/>
    <path d="M98 104q13-7 26 0" fill="none" stroke="#0b1426" stroke-width="3.4" stroke-linecap="round"/>
    <!-- 右眼 -->
    <ellipse cx="149" cy="114" rx="12" ry="16" fill="#0b1426"/>
    <ellipse cx="149" cy="117" rx="9.5" ry="12.5" fill="url(#h-eye)"/>
    <circle cx="145" cy="109" r="4.2" fill="#ffffff"/>
    <circle cx="152" cy="121" r="2.2" fill="#d8ffff" opacity="0.85"/>
    <path d="M136 104q13-7 26 0" fill="none" stroke="#0b1426" stroke-width="3.4" stroke-linecap="round"/>
  </g>
  <!-- 鼻與嘴 -->
  <path d="M128 122l4 6h-6Z" fill="#d79e7c" opacity="0.5"/>
  <path d="M122 132q8 6 16 0" fill="none" stroke="#a8503f" stroke-width="2.4" stroke-linecap="round"/>
  <!-- 腮紅 -->
  <ellipse cx="102" cy="126" rx="7" ry="4" fill="#ff8fa3" opacity="0.4"/>
  <ellipse cx="158" cy="126" rx="7" ry="4" fill="#ff8fa3" opacity="0.4"/>

  <!-- 懸浮齒輪（右手上方）-->
  <g transform="translate(206 150)">
    <circle r="26" fill="url(#h-gear)" opacity="0.7"/>
    <g fill="#cfeffb" stroke="#0b1426" stroke-width="2">
      <circle r="14"/>
      <g>
        <rect x="-3" y="-20" width="6" height="8" rx="1"/>
        <rect x="-3" y="12" width="6" height="8" rx="1"/>
        <rect x="-20" y="-3" width="8" height="6" rx="1"/>
        <rect x="12" y="-3" width="8" height="6" rx="1"/>
        <rect x="-16" y="-16" width="6" height="7" rx="1" transform="rotate(45)"/>
        <rect x="10" y="-16" width="6" height="7" rx="1" transform="rotate(-45)"/>
      </g>
    </g>
    <circle r="5" fill="#ffd24a"/>
  </g>

  <!-- 邊光 -->
  <path d="M74 70c-6 16-8 34-6 50" fill="none" stroke="#baf6ff" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M76 184c-8 22-10 50-4 78" fill="none" stroke="#7fe9ff" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
</svg>
