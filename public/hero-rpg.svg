      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#5eead4" flood-opacity="0.22"/>
    </filter>
    <filter id="softBloom" x="70" y="86" width="178" height="214" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
