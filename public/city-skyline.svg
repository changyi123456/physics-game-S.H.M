<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-label="週期城天際線" preserveAspectRatio="xMidYMax meet">
  <defs>
    <linearGradient id="sk-tower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10243a"/>
      <stop offset="0.55" stop-color="#0a1830"/>
      <stop offset="1" stop-color="#050b1c"/>
    </linearGradient>
    <linearGradient id="sk-tower2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#142b46"/>
      <stop offset="1" stop-color="#07101f"/>
    </linearGradient>
    <linearGradient id="sk-clock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c3a52"/>
      <stop offset="0.5" stop-color="#102236"/>
      <stop offset="1" stop-color="#070d1d"/>
    </linearGradient>
    <radialGradient id="sk-moon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff7e0"/>
      <stop offset="0.45" stop-color="#ffcf4a"/>
      <stop offset="1" stop-color="#ffcf4a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sk-clockglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38f2e6"/>
      <stop offset="0.6" stop-color="#38f2e6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#38f2e6" stop-opacity="0"/>
    </radialGradient>
    <filter id="sk-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- 月與光暈 -->
  <circle cx="980" cy="120" r="150" fill="url(#sk-moon)" opacity="0.5"/>
  <circle cx="980" cy="120" r="58" fill="#fff7e0" opacity="0.92"/>
  <circle cx="958" cy="104" r="58" fill="#0a1830" opacity="0.85"/>

  <!-- 遠景塔群（淡） -->
  <g fill="url(#sk-tower2)" opacity="0.5">
    <rect x="60" y="300" width="70" height="220" rx="6"/>
    <rect x="150" y="250" width="54" height="270" rx="6"/>
    <rect x="232" y="320" width="80" height="200" rx="6"/>
    <rect x="1040" y="270" width="64" height="250" rx="6"/>
    <rect x="1120" y="320" width="60" height="200" rx="6"/>
  </g>

  <!-- 懸浮齒輪 -->
  <g stroke="#38f2e6" stroke-width="4" fill="none" opacity="0.4">
    <circle cx="170" cy="150" r="34"/>
    <circle cx="170" cy="150" r="14"/>
  </g>
  <g stroke="#b07bff" stroke-width="3" fill="none" opacity="0.35">
    <circle cx="250" cy="200" r="20"/>
  </g>

  <!-- 中央鐘塔（主角建物） -->
  <g>
    <circle cx="600" cy="190" r="120" fill="url(#sk-clockglow)" opacity="0.7" filter="url(#sk-soft)"/>
    <rect x="540" y="200" width="120" height="320" rx="10" fill="url(#sk-clock)" stroke="#1f4a63" stroke-width="3"/>
    <!-- 塔頂 -->
    <path d="M540 200 L600 120 L660 200 Z" fill="#16324a" stroke="#2a5f7e" stroke-width="3"/>
    <path d="M600 120 L600 88" stroke="#38f2e6" stroke-width="4" stroke-linecap="round"/>
    <circle cx="600" cy="84" r="7" fill="#38f2e6"/>
    <!-- 鐘面（無指針） -->
    <circle cx="600" cy="250" r="46" fill="#0a1626" stroke="#38f2e6" stroke-width="4"/>
    <circle cx="600" cy="250" r="46" fill="none" stroke="#ffcf4a" stroke-width="1.5" opacity="0.5"/>
    <g stroke="#cfeaf2" stroke-width="2" opacity="0.8">
      <line x1="600" y1="210" x2="600" y2="220" stroke="#cfeaf2"/>
      <line x1="600" y1="280" x2="600" y2="290" stroke="#cfeaf2"/>
      <line x1="560" y1="250" x2="570" y2="250" stroke="#cfeaf2"/>
      <line x1="630" y1="250" x2="640" y2="250" stroke="#cfeaf2"/>
    </g>
    <circle cx="600" cy="250" r="5" fill="#ff3b6b"/>
    <!-- 窗光 -->
    <g fill="#ffcf4a" opacity="0.85">
      <rect x="566" y="330" width="14" height="20" rx="2"/>
      <rect x="620" y="330" width="14" height="20" rx="2"/>
      <rect x="566" y="372" width="14" height="20" rx="2"/>
      <rect x="620" y="372" width="14" height="20" rx="2"/>
      <rect x="593" y="410" width="14" height="22" rx="2"/>
    </g>
  </g>

  <!-- 左右近景塔 -->
  <g>
    <rect x="360" y="280" width="96" height="240" rx="8" fill="url(#sk-tower)" stroke="#173249" stroke-width="2.5"/>
    <path d="M360 280 L408 232 L456 280 Z" fill="#13283d" stroke="#21465f" stroke-width="2.5"/>
    <g fill="#38f2e6" opacity="0.8">
      <rect x="378" y="312" width="12" height="16" rx="2"/>
      <rect x="426" y="312" width="12" height="16" rx="2"/>
      <rect x="378" y="350" width="12" height="16" rx="2"/>
      <rect x="426" y="350" width="12" height="16" rx="2"/>
      <rect x="378" y="388" width="12" height="16" rx="2"/>
      <rect x="426" y="388" width="12" height="16" rx="2"/>
    </g>
  </g>
  <g>
    <rect x="744" y="260" width="104" height="260" rx="8" fill="url(#sk-tower)" stroke="#173249" stroke-width="2.5"/>
    <path d="M744 260 L796 206 L848 260 Z" fill="#13283d" stroke="#21465f" stroke-width="2.5"/>
    <g fill="#ffcf4a" opacity="0.78">
      <rect x="764" y="296" width="12" height="16" rx="2"/>
      <rect x="816" y="296" width="12" height="16" rx="2"/>
      <rect x="764" y="334" width="12" height="16" rx="2"/>
      <rect x="816" y="334" width="12" height="16" rx="2"/>
      <rect x="790" y="372" width="12" height="16" rx="2"/>
    </g>
  </g>

  <!-- 空橋 -->
  <path d="M456 360 Q600 330 744 348" fill="none" stroke="#38f2e6" stroke-width="3" opacity="0.55"/>
  <path d="M312 420 Q480 400 540 408" fill="none" stroke="#38f2e6" stroke-width="2" opacity="0.35"/>

  <!-- 前景剪影人物（站在橋上） -->
  <g fill="#04101e">
    <g transform="translate(486 338)">
      <circle cx="0" cy="-14" r="6"/>
      <path d="M-6 -8 Q0 -10 6 -8 L7 12 L-7 12 Z"/>
      <rect x="-6" y="12" width="4" height="12"/>
      <rect x="2" y="12" width="4" height="12"/>
    </g>
    <g transform="translate(700 340)">
      <circle cx="0" cy="-14" r="6"/>
      <path d="M-6 -8 Q0 -10 6 -8 L7 12 L-7 12 Z"/>
      <rect x="-6" y="12" width="4" height="12"/>
      <rect x="2" y="12" width="4" height="12"/>
    </g>
  </g>

  <!-- 地平能量線 -->
  <rect x="0" y="512" width="1200" height="8" fill="#38f2e6" opacity="0.25"/>
</svg>
